<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>현준의 사진세상 - 게시판</title>
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/board.css">
</head>
<body>

  <!-- 헤더 -->
  <header class="header" id="header">
    <div class="header__inner">

      <!-- 로고 -->
      <a href="gallery.html" class="header__logo">현준의 사진세상</a>

      <!-- 헤더 우측 아이콘 그룹 -->
      <div class="header__icons">

        <!-- 관리자 모드 버튼 (관리자 로그인 시만 표시) -->
        <button class="header__admin-mode" id="adminModeBtn" style="display:none" aria-label="관리자 모드">관리자 모드</button>

        <!-- 햄버거 메뉴 버튼 (태블릿/모바일용) -->
        <button class="header__hamburger" id="hamburgerBtn" aria-label="메뉴">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="3" y1="6" x2="21" y2="6"/>
            <line x1="3" y1="12" x2="21" y2="12"/>
            <line x1="3" y1="18" x2="21" y2="18"/>
          </svg>
        </button>

        <!-- Board 아이콘 -->
        <a href="board.html" class="header__board" aria-label="게시판">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/>
            <line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/>
          </svg>
        </a>

        <!-- 유저 아이콘 (로그아웃 상태: 로그인 모달 / 로그인 상태: 로그아웃) -->
        <button class="header__user" id="userBtn" aria-label="로그인">
          <!-- 사람 아이콘 (기본) -->
          <svg class="icon-login" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
            <circle cx="12" cy="7" r="4"/>
          </svg>
          <!-- 로그아웃 아이콘 (로그인 시 표시) -->
          <svg class="icon-logout" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
            <polyline points="16 17 21 12 16 7"/>
            <line x1="21" y1="12" x2="9" y2="12"/>
          </svg>
        </button>

      </div>

    </div>

    <!-- GNB 카테고리 -->
    <nav class="gnb">
      <ul class="gnb__list">
        <li class="gnb__item"><a href="gallery.html" class="gnb__link">longexposure</a></li>
        <li class="gnb__item gnb__item--has-sub">
          <a href="gallery.html" class="gnb__link">series</a>
          <ul class="gnb__sub">
            <li><a href="gallery.html">goyang-ilsan</a></li>
            <li><a href="gallery.html">jeju</a></li>
          </ul>
        </li>
        <li class="gnb__item"><a href="gallery.html" class="gnb__link">sunrise-sunset</a></li>
        <li class="gnb__item"><a href="gallery.html" class="gnb__link">trajectory</a></li>
        <li class="gnb__item gnb__item--has-sub">
          <a href="gallery.html" class="gnb__link">travel</a>
          <ul class="gnb__sub">
            <li><a href="gallery.html">chungcheong</a></li>
            <li><a href="gallery.html">gangwon</a></li>
            <li><a href="gallery.html">gyengsang</a></li>
            <li><a href="gallery.html">incheon</a></li>
            <li><a href="gallery.html">jeolla</a></li>
            <li><a href="gallery.html">jeju</a></li>
            <li><a href="gallery.html">seoul-gyenggi</a></li>
          </ul>
        </li>
        <li class="gnb__item"><a href="gallery.html" class="gnb__link">typological</a></li>
        <li class="gnb__item"><a href="board.html" class="gnb__link gnb__link--community is-active">커뮤니티</a></li>
      </ul>
    </nav>
  </header>

  <!-- 게시판 메인 -->
  <main class="board">
    <div class="board__inner">

      <!-- 게시판 제목 -->
      <div class="board__heading">
        <h2 class="board__title">자유게시판</h2>
      </div>

      <!-- 검색바 -->
      <div class="board__search-wrap">
        <input type="text" class="board__search-input" id="searchInput" placeholder="검색어를 입력해주세요.">
        <button class="board__search-btn" id="searchBtn">검색</button>
      </div>

      <!-- 글쓰기 버튼 (로그인 시에만 표시) -->
      <div class="board__toolbar">
        <a href="write.html" class="board__write-btn" id="writeBtn">글쓰기</a>
      </div>

      <!-- 게시글 목록 테이블 -->
      <table class="board__table">
        <thead>
          <tr>
            <th class="board__col-num">번호</th>
            <th class="board__col-title">제목</th>
            <th class="board__col-author">작성자</th>
            <th class="board__col-date">작성일</th>
            <th class="board__col-views">조회수</th>
          </tr>
        </thead>
        <tbody class="board__tbody" id="boardTbody">
          <!-- 게시글 목록 JS로 동적 삽입 -->
        </tbody>
      </table>

      <!-- 페이지네이션 -->
      <div class="board__pagination" id="pagination">
        <button class="pagination__prev" id="prevBtn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="15 18 9 12 15 6"/>
          </svg>
        </button>
        <ul class="pagination__list" id="pageList"></ul>
        <button class="pagination__next" id="nextBtn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="9 18 15 12 9 6"/>
          </svg>
        </button>
      </div>

    </div>
  </main>

  <!-- 푸터 -->
  <footer class="footer"></footer>

  <!-- 로그인 모달 -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <button class="modal__close" id="modalClose">&times;</button>
      <h2 class="modal__title">현준의 사진세상</h2>
      <div class="modal__tabs">
        <button class="modal__tab is-active" data-tab="login">로그인</button>
        <button class="modal__tab" data-tab="signup">회원가입</button>
      </div>
      <!-- 로그인 폼 -->
      <div class="modal__form" id="loginForm">
        <input type="email" id="loginEmail" placeholder="이메일">
        <input type="password" id="loginPassword" placeholder="비밀번호">
        <p class="modal__error" id="loginError"></p>
        <button class="modal__submit" id="loginSubmit">로그인</button>
      </div>
      <!-- 회원가입 폼 -->
      <div class="modal__form" id="signupForm" style="display:none">
        <input type="email" id="signupEmail" placeholder="이메일">
        <input type="password" id="signupPassword" placeholder="비밀번호 (6자 이상)">
        <p class="modal__error" id="signupError"></p>
        <button class="modal__submit" id="signupSubmit">회원가입</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/header.js"></script>
  <script src="js/board.js"></script>
</body>
</html>
